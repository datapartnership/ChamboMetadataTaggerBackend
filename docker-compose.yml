services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # Keep these in sync with Database__* values in .env
      POSTGRES_DB: chambo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chambo_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override the host so the app reaches the db container, not localhost
      Database__Host: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
